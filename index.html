<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sushi Belt</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
      canvas { display: block; width: 100vw; height: 100vh; }

      /* ── Toolbar ── */
      #toolbar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        align-items: stretch;
        gap: 4px;
        padding: 8px 12px;
        background: rgba(10, 10, 30, 0.85);
        backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        z-index: 10;
        user-select: none;
        pointer-events: auto;
      }
      #toolbar .separator {
        width: 1px;
        background: rgba(255, 255, 255, 0.15);
        margin: 2px 6px;
      }
      .tool-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        padding: 6px 14px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.05);
        color: #ccc;
        font-family: monospace;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.1s, border-color 0.1s;
        min-width: 64px;
      }
      .tool-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }
      .tool-btn.active {
        background: rgba(80, 140, 255, 0.25);
        border-color: rgba(80, 140, 255, 0.6);
        color: #fff;
      }
      .tool-btn .icon {
        font-size: 18px;
        line-height: 1;
      }
      .tool-btn .hotkey {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.35);
      }

      /* ── Building picker (shown when build tool active) ── */
      #building-picker {
        position: fixed;
        bottom: 64px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        gap: 4px;
        padding: 6px 10px;
        background: rgba(10, 10, 30, 0.9);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        z-index: 11;
        user-select: none;
      }
      #building-picker.visible {
        display: flex;
      }
      .building-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        padding: 8px 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.05);
        color: #ccc;
        font-family: monospace;
        font-size: 11px;
        cursor: pointer;
        transition: background 0.1s, border-color 0.1s;
      }
      .building-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }
      .building-btn.active {
        background: rgba(80, 140, 255, 0.25);
        border-color: rgba(80, 140, 255, 0.6);
        color: #fff;
      }
      .building-btn .b-icon {
        font-size: 20px;
        line-height: 1;
      }
      .building-btn .b-terrain {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.35);
      }

      /* ── Shop Panel ── */
      #shop-panel {
        position: fixed;
        top: 60px;
        right: 0;
        width: 180px;
        max-height: calc(100vh - 140px);
        overflow-y: auto;
        background: rgba(10, 10, 30, 0.85);
        backdrop-filter: blur(8px);
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 0 0 0 8px;
        z-index: 10;
        user-select: none;
        pointer-events: auto;
      }
      .shop-header {
        padding: 8px 12px;
        font-family: monospace;
        font-size: 14px;
        font-weight: bold;
        color: #fff;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .shop-section {
        padding: 4px 0;
      }
      .shop-section-title {
        padding: 4px 12px;
        font-family: monospace;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.4);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .shop-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        font-family: monospace;
        font-size: 11px;
        color: #ccc;
        cursor: pointer;
        transition: background 0.1s;
      }
      .shop-item:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      .shop-item.unlocked {
        color: #8f8;
      }
      .shop-item.affordable {
        color: #fff;
        background: rgba(80, 140, 255, 0.1);
      }
      .shop-item.affordable:hover {
        background: rgba(80, 140, 255, 0.2);
      }
      .shop-item.locked {
        color: #666;
        cursor: default;
      }
      .shop-item .shop-icon {
        font-size: 14px;
        width: 20px;
        text-align: center;
      }
      .shop-item .shop-info {
        flex: 1;
        min-width: 0;
      }
      .shop-item .shop-name {
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .shop-item .shop-cost {
        display: block;
        font-size: 9px;
        color: rgba(255, 255, 255, 0.4);
      }
      .shop-item.affordable .shop-cost {
        color: #ffcc44;
      }
      .shop-item .shop-status {
        font-size: 12px;
        width: 16px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- Toolbar -->
    <div id="toolbar">
      <button class="tool-btn active" data-tool="place_building">
        <span class="icon">🏠</span>
        <span>Build</span>
        <span class="hotkey">B</span>
      </button>
      <button class="tool-btn" id="rotate-btn" data-action="rotate">
        <span class="icon" id="rotate-icon">⬆️</span>
        <span>Rotate</span>
        <span class="hotkey">R</span>
      </button>
      <button class="tool-btn" data-tool="place_belt">
        <span class="icon">➡️</span>
        <span>Belt</span>
        <span class="hotkey">B</span>
      </button>
      <div class="separator"></div>
      <button class="tool-btn" data-tool="delete">
        <span class="icon">🗑️</span>
        <span>Delete</span>
        <span class="hotkey">X</span>
      </button>
    </div>

    <!-- Building picker (appears above toolbar when Build is active) -->
    <div id="building-picker" class="visible">
      <button class="building-btn active" data-building="fishing_boat">
        <span class="b-icon">🎣</span>
        <span>Fishing Boat</span>
        <span class="b-terrain">water · $0</span>
      </button>
      <button class="building-btn" data-building="fish_market">
        <span class="b-icon">🏪</span>
        <span>Fish Market</span>
        <span class="b-terrain">land · $0</span>
      </button>
      <button class="building-btn" data-building="cutting_board">
        <span class="b-icon">🔪</span>
        <span>Cutting Board</span>
        <span class="b-terrain">land · $25</span>
      </button>
    </div>

    <!-- Shop panel (right side) -->
    <div id="shop-panel">
      <div class="shop-header">Shop</div>
      <div id="shop-buildings" class="shop-section">
        <div class="shop-section-title">Buildings</div>
      </div>
      <div id="shop-upgrades" class="shop-section">
        <div class="shop-section-title">Upgrades</div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
