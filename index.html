<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sushi Belt</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
      canvas { display: block; width: 100vw; height: 100vh; }

      /* ── Toolbar ── */
      #toolbar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        align-items: stretch;
        gap: 4px;
        padding: 8px 12px;
        background: rgba(10, 10, 30, 0.85);
        backdrop-filter: blur(8px);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        z-index: 10;
        user-select: none;
        pointer-events: auto;
      }
      #toolbar .separator {
        width: 1px;
        background: rgba(255, 255, 255, 0.15);
        margin: 2px 6px;
      }
      .tool-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        padding: 6px 14px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.05);
        color: #ccc;
        font-family: monospace;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.1s, border-color 0.1s;
        min-width: 64px;
      }
      .tool-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }
      .tool-btn.active {
        background: rgba(80, 140, 255, 0.25);
        border-color: rgba(80, 140, 255, 0.6);
        color: #fff;
      }
      .tool-btn .icon {
        font-size: 18px;
        line-height: 1;
      }
      .tool-btn .hotkey {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.35);
      }

      /* ── Building picker (shown when build tool active) ── */
      #building-picker {
        position: fixed;
        bottom: 64px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        gap: 4px;
        padding: 6px 10px;
        background: rgba(10, 10, 30, 0.9);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        z-index: 11;
        user-select: none;
      }
      #building-picker.visible {
        display: flex;
      }
      .building-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        padding: 8px 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.05);
        color: #ccc;
        font-family: monospace;
        font-size: 11px;
        cursor: pointer;
        transition: background 0.1s, border-color 0.1s;
      }
      .building-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }
      .building-btn.active {
        background: rgba(80, 140, 255, 0.25);
        border-color: rgba(80, 140, 255, 0.6);
        color: #fff;
      }
      .building-btn .b-icon {
        font-size: 20px;
        line-height: 1;
      }
      .building-btn .b-terrain {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.35);
      }
    </style>
  </head>
  <body>
    <!-- Toolbar -->
    <div id="toolbar">
      <button class="tool-btn active" data-tool="place_building">
        <span class="icon">🏠</span>
        <span>Build</span>
        <span class="hotkey">B</span>
      </button>
      <button class="tool-btn" data-tool="place_belt">
        <span class="icon">➡️</span>
        <span>Belt</span>
        <span class="hotkey">B</span>
      </button>
      <div class="separator"></div>
      <button class="tool-btn" data-tool="delete">
        <span class="icon">🗑️</span>
        <span>Delete</span>
        <span class="hotkey">X</span>
      </button>
    </div>

    <!-- Building picker (appears above toolbar when Build is active) -->
    <div id="building-picker" class="visible">
      <button class="building-btn active" data-building="fishing_boat">
        <span class="b-icon">🎣</span>
        <span>Fishing Boat</span>
        <span class="b-terrain">water · $0</span>
      </button>
      <button class="building-btn" data-building="fish_market">
        <span class="b-icon">🏪</span>
        <span>Fish Market</span>
        <span class="b-terrain">land · $0</span>
      </button>
      <button class="building-btn" data-building="cutting_board">
        <span class="b-icon">🔪</span>
        <span>Cutting Board</span>
        <span class="b-terrain">land · $25</span>
      </button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
